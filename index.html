<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    
    <div class="game-area">
        <div class="choices">
            <h2>Choose your move:</h2>
            <button id="rock-btn">Rock</button>
            <button id="paper-btn">Paper</button>
            <button id="scissors-btn">Scissors</button>
            <button class="bst" id="bst1">Best of 1</button>
            <button class="bst" id="bst3">Best of 3</button>
            <button class="bst" id="bst5">Best of 5</button>
        </div>
        
        <div class="results">
            <h3>Results:</h3>
            <p id="player-choice">You chose: -</p>
            <p id="computer-choice">Computer chose: -</p>
            <p id="round-result">Make your choice!</p>
        </div>
        
        <div class="score">
            <h3>Score:</h3>
            <p>You: <span id="player-score">0</span></p>
            <p>Computer: <span id="computer-score">0</span></p>
        </div>
        
        <button id="reset-btn">Reset Game</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
